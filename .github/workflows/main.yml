name: Build Android APK

on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Capacitor and Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install jspdf html2canvas

      - name: 📁 Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp node_modules/jspdf/dist/jspdf.umd.min.js www/ 2>/dev/null || echo "jsPDF will load from CDN"
          cp node_modules/html2canvas/dist/html2canvas.min.js www/ 2>/dev/null || echo "html2canvas will load from CDN"
          cat > capacitor.config.json << EOF
          {
            "appId": "com.coachpro.app",
            "appName": "Coach Pro",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: 🤖 Initialize Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: 🔧 Fix Gradle Issues
        run: |
          echo "configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coach-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: ✅ Build Complete
        run: |
          echo "✅ Coach Pro APK built successfully!"
          echo "📱 Download from Artifacts section"
          echo "🔐 Default PIN: 0000"
          echo "💪 Powered by FAAJ77.QWEN"
